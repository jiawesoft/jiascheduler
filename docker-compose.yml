# start docker compose:
# sudo docker compose up -d

services:
  jiascheduler-mysql:
    image: mysql:latest
    restart: always
    container_name: jiascheduler-mysql
    networks:
      - jiascheduler-network
    volumes:
      - jiascheduler_mysql_data:/var/lib/mysql
      # - $WORKCONF/mysql/conf/my.cnf:/etc/my.conf
      - jiascheduler_mysql_logs:/var/log/mysql
    environment:
      - TZ=Asia/Shanghai # 设置时区
      - MYSQL_ROOT_PASSWORD=kytHmeBR4Vg
      - MYSQL_DATABASE=jiascheduler # 自动创建数据库
    ports:
      - 3306:3306

  jiascheduler-redis:
    image: redis:latest
    restart: always
    container_name: jiascheduler-redis
    networks:
      - jiascheduler-network
    volumes:
      - jiascheduler_redis_data:/data
      # - $WORKCONF/redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
      - jiascheduler_redis_logs:/logs
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=3DGiuazc7wkAppV3
    command: ["redis-server", "--requirepass", "3DGiuazc7wkAppV3"]

  jiascheduler-console:
    restart: always
    image: iwannay/jiascheduler
    depends_on:
      - jiascheduler-mysql
      - jiascheduler-redis
    container_name: jiascheduler-console
    networks:
      - jiascheduler-network
    ports:
      - "9090:9090"
    volumes:
      - ./console.toml:/root/.jiascheduler/console.toml
    # command: ["./jiascheduler-console", "--bind-addr", "0.0.0.0:9090"]

  jiascheduler-comet:
    restart: always
    image: iwannay/jiascheduler
    depends_on:
      - jiascheduler-redis
    container_name: jiascheduler-comet
    networks:
      - jiascheduler-network
    ports:
      - "3000:3000"
    command:
      [
        "./jiascheduler-comet",
        "--bind",
        "0.0.0.0:3000",
        "-r",
        "redis://default:3DGiuazc7wkAppV3@jiascheduler-redis:6379",
        "--secret",
        "rYzBYE+cXbtdMg==",
      ]

  jiascheduler-agent:
    restart: always
    image: iwannay/jiascheduler
    depends_on:
      - jiascheduler-comet
    container_name: jiascheduler-agent
    networks:
      - jiascheduler-network
    command:
      [
        "./jiascheduler-agent",
        "--comet-addr",
        "ws://jiascheduler-comet:3000",
        "--assign-username",
        "guest",
        "--assign-password",
        "guest",
        "--namespace",
        "home",
      ]

volumes:
  jiascheduler_mysql_data:
    name: jiascheduler_mysql_data
  jiascheduler_mysql_logs:
    name: jiascheduler_mysql_logs
  jiascheduler_redis_data:
    name: jiascheduler_redis_data
  jiascheduler_redis_logs:
    name: jiascheduler_redis_logs

networks:
  jiascheduler-network:
    driver: bridge
